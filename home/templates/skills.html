{% extends 'about.html' %}
{% block sub_content %}

<section class="p-6 bg-gray-50 min-h-screen">

    <div class="max-w-5xl mx-auto">

        <h2 class="text-3xl font-bold text-gray-800 mb-10 text-center">
            Skills
        </h2>

        <div class="flex flex-wrap justify-center gap-4">

            {% for x in skill_info %}
            <div class="px-6 py-3 rounded-full bg-gradient-to-r from-blue-100 to-purple-100
                        text-gray-800 font-medium shadow-sm hover:shadow-lg
                        hover:scale-105 transition duration-300 cursor-pointer">

                {{ x.name }}

            </div>
            {% empty %}
            <p class="text-gray-500 text-center">
                No skills added yet.
            </p>
            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
